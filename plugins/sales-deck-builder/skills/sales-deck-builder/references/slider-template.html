<!--
  SALES DECK SLIDER TEMPLATE
  Base template for all presentations. Copy and fill in slides.
  Dependencies: Tailwind CSS via CDN. No build step.
  Navigation: Arrow keys, click arrows, touch swipe, dot indicators.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- PRESENTATION TITLE --></title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'var(--brand-primary)',
              dark: 'var(--brand-dark)',
              light: 'var(--brand-light)',
              accent: 'var(--brand-accent)',
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --brand-primary: #2563eb;
      --brand-dark: #1e293b;
      --brand-light: #f8fafc;
      --brand-accent: #f59e0b;
      --slide-count: 9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { overflow: hidden; font-family: 'Inter', sans-serif; }
    .deck {
      display: flex;
      width: calc(100vw * var(--slide-count));
      height: 100vh;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .slide {
      width: 100vw; height: 100vh; flex-shrink: 0;
      overflow: hidden; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .slide .animate-in {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .slide.active .animate-in { opacity: 1; transform: translateY(0); }
    .slide.active .animate-in:nth-child(2) { transition-delay: 0.15s; }
    .slide.active .animate-in:nth-child(3) { transition-delay: 0.3s; }
    .slide.active .animate-in:nth-child(4) { transition-delay: 0.45s; }
    .nav-arrows {
      position: fixed; bottom: 2rem; right: 2rem;
      display: flex; gap: 0.5rem; z-index: 100;
    }
    .nav-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.4); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(8px); transition: all 0.2s;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.7); border-color: rgba(255,255,255,0.6); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .progress-dots {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 100;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s;
    }
    .dot.active { background: white; transform: scale(1.3); }
    .slide-counter {
      position: fixed; top: 2rem; right: 2rem;
      color: rgba(255,255,255,0.5); font-size: 0.875rem; font-weight: 500; z-index: 100;
    }
    @media print {
      body { overflow: visible; }
      .deck { display: block; width: 100%; transform: none !important; transition: none; }
      .slide { width: 100%; height: auto; min-height: 100vh; page-break-after: always; }
      .nav-arrows, .progress-dots, .slide-counter { display: none; }
    }
    @media (max-width: 768px) {
      .nav-arrows { bottom: 1rem; right: 1rem; }
      .nav-btn { width: 40px; height: 40px; }
      .progress-dots { bottom: 1rem; }
    }
    .slide section { width: 100%; min-height: 100vh; display: flex; align-items: center; }
  </style>
</head>
<body>
  <div class="slide-counter"><span id="currentSlide">1</span> / <span id="totalSlides">9</span></div>
  <div class="progress-dots" id="progressDots"></div>
  <div class="nav-arrows">
    <button class="nav-btn" id="prevBtn" aria-label="Previous slide">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 4l-6 6 6 6"/></svg>
    </button>
    <button class="nav-btn" id="nextBtn" aria-label="Next slide">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4l6 6-6 6"/></svg>
    </button>
  </div>
  <div class="deck" id="deck">
    <!-- SLIDE 1: Hook / Hero -->
    <div class="slide" data-slide="1"><!-- INSERT TAILGRIDS HERO BLOCK --></div>
    <!-- SLIDE 2: Problem -->
    <div class="slide" data-slide="2"><!-- INSERT TAILGRIDS BLOCK --></div>
    <!-- SLIDE 3: Consequences -->
    <div class="slide" data-slide="3"><!-- INSERT TAILGRIDS BLOCK --></div>
    <!-- SLIDE 4: Solution -->
    <div class="slide" data-slide="4"><!-- INSERT TAILGRIDS BLOCK --></div>
    <!-- SLIDE 5: How It Works -->
    <div class="slide" data-slide="5"><!-- INSERT TAILGRIDS BLOCK --></div>
    <!-- SLIDE 6: Proof -->
    <div class="slide" data-slide="6"><!-- INSERT TAILGRIDS BLOCK --></div>
    <!-- SLIDE 7: Comparison -->
    <div class="slide" data-slide="7"><!-- INSERT TAILGRIDS BLOCK --></div>
    <!-- SLIDE 8: Offer -->
    <div class="slide" data-slide="8"><!-- INSERT TAILGRIDS BLOCK --></div>
    <!-- SLIDE 9: CTA -->
    <div class="slide" data-slide="9"><!-- INSERT TAILGRIDS BLOCK --></div>
  </div>
  <script>
    const deck = document.getElementById('deck');
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    let currentIndex = 0;
    document.documentElement.style.setProperty('--slide-count', totalSlides);
    document.getElementById('totalSlides').textContent = totalSlides;
    const dotsContainer = document.getElementById('progressDots');
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = `dot${i === 0 ? ' active' : ''}`;
      dot.addEventListener('click', () => goToSlide(i));
      dotsContainer.appendChild(dot);
    });
    function goToSlide(index) {
      if (index < 0 || index >= totalSlides) return;
      currentIndex = index;
      deck.style.transform = `translateX(-${currentIndex * 100}vw)`;
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentIndex));
      slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex));
      document.getElementById('currentSlide').textContent = currentIndex + 1;
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled = currentIndex === totalSlides - 1;
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goToSlide(currentIndex + 1); }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goToSlide(currentIndex - 1); }
      if (e.key === 'Home') goToSlide(0);
      if (e.key === 'End') goToSlide(totalSlides - 1);
    });
    document.getElementById('prevBtn').addEventListener('click', () => goToSlide(currentIndex - 1));
    document.getElementById('nextBtn').addEventListener('click', () => goToSlide(currentIndex + 1));
    let touchStartX = 0;
    deck.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    deck.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].screenX;
      if (Math.abs(diff) > 50) { diff > 0 ? goToSlide(currentIndex + 1) : goToSlide(currentIndex - 1); }
    }, { passive: true });
    goToSlide(0);
  </script>
</body>
</html>
